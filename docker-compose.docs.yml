services:
  docs:
    image: voice_core_local_docs
    container_name: voice_core_local_docs
    build:
      context: .
      dockerfile: ./compose/local/docs/Dockerfile
    env_file:
      - ./.envs/.local/.django
    volumes:
      - ./docs:/docs:z
      - ./config:/app/config:z
      - ./voice_core:/app/voice_core:z
    ports:
      - '9000:9000'
    command: /start-docs
